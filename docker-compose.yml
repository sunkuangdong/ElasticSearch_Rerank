services:
  # Elasticsearch 8.17.0 + IK Chinese analyzer (built into image)
  es:
    build: ./elasticsearch       # Build from local Dockerfile (includes IK plugin)
    container_name: es-dev
    ports:
      - "9200:9200"               # ES HTTP API port
    environment:
      - discovery.type=single-node  # Single-node mode for development
      - xpack.security.enabled=false  # Disable security auth for passwordless access
      - xpack.security.http.ssl.enabled=false  # Disable HTTPS
      - xpack.security.transport.ssl.enabled=false  # Disable transport-layer TLS
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # JVM heap size to limit memory usage
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/es/data:/usr/share/elasticsearch/data
    restart: always

  # Kibana 8.17.0 (must match ES version exactly)
  kibana:
    image: kibana:8.17.0
    container_name: kibana-dev
    ports:
      - "5601:5601"  # Kibana web UI port
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200  # Internal ES service URL within Docker network
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/kibana:/usr/share/kibana/data
    restart: always
    depends_on:
      - es  # Start Kibana after ES is up

  # Milvus stack: etcd + MinIO + standalone (v2.5.25)
  etcd:
    container_name: etcd-dev
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: minio-dev
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: standalone-dev
    image: milvusdb/milvus:v2.5.25
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # Rerank (TEI): on Apple Silicon, Docker amd64 TEI segfaults under QEMU — run natively instead:
  #   brew install text-embeddings-inference
  #   text-embeddings-router --model-id BAAI/bge-reranker-v2-m3 --port 8080
  # On Linux/x86_64 you can uncomment the service below.
  # tei-rerank:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
  #   container_name: tei-rerank-dev
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/tei:/data
  #   command: --model-id newtechstudio/bge-reranker-v2-m3-onnx
  #   restart: unless-stopped

networks:
  default:
    name: common-network
